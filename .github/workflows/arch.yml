name: Xploit-HUB-Arch
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Pull Arch Linux + Install Desktop + VNC
        run: |
          # NOTE: xrdp is in the AUR only (not official Arch repos), so we use x11vnc + noVNC browser access
          docker pull archlinux:latest
          docker run -d --name arch -p 5901:5901 archlinux:latest sleep infinity

          # Install XFCE4 + x11vnc from official repos
          docker exec arch bash -c "pacman -Sy --noconfirm xfce4 xfce4-goodies xorg-server \
            xorg-xinit xf86-video-vesa x11vnc curl wget git nmap python3 net-tools htop neofetch 2>/dev/null || true"

          # Create user
          docker exec arch bash -c "useradd -m -s /bin/bash xploit && echo 'xploit:phantom' | chpasswd"
          docker exec arch bash -c "mkdir -p /home/xploit/.config && chown -R xploit:xploit /home/xploit"

      - name: Start Xvfb + XFCE4 + x11vnc
        run: |
          # Start Xvfb virtual display inside container
          docker exec -d arch bash -c "Xvfb :1 -screen 0 1280x800x24 > /tmp/xvfb.log 2>&1"
          sleep 3

          # Apply wallpaper if provided
          WALLPAPER="${{ github.event.inputs.wallpaper_url }}"
          if [ -n "$WALLPAPER" ]; then
            docker exec -d arch bash -c "DISPLAY=:1 xfdesktop --reload 2>/dev/null || true"
          fi

          # Start XFCE4 desktop on virtual display
          docker exec -d arch bash -c "DISPLAY=:1 startxfce4 > /tmp/xfce4.log 2>&1"
          sleep 6

          # Start x11vnc — serves display :1 on port 5901 with standard VNC password auth (no WebCrypto needed)
          docker exec -d arch bash -c "x11vnc -display :1 -rfbport 5901 -passwd phantom \
            -forever -noxdamage -nossl -o /tmp/x11vnc.log"
          sleep 3

      - name: Setup noVNC on Host + Bore Tunnel + Send DM
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          pip3 install websockify --quiet 2>/dev/null || true
          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null 2>&1

          # novnc_proxy: HTTP server for the web UI + WebSocket proxy to x11vnc:5901
          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 8080 > /tmp/novnc.log 2>&1 &
          sleep 4

          curl -sL -o bore.tar.gz \
            https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 8080 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **Arch Launch Failed** — bore tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          BROWSER_LINK="http://bore.pub:$PORT/vnc.html?autoconnect=1&password=phantom&compression=2&quality=6"

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🏹 **REAL ARCH LINUX — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🌐 **Browser Access (no app needed):**\n$BROWSER_LINK\n\n🔑 **VNC Password:** \`phantom\`\n⏱ **Duration:** $DURATION minutes\n\n*Click the link — opens directly in your browser.*\n**BTW, I use Arch.**\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
