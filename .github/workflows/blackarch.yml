name: Xploit-HUB-BlackArch
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Pull BlackArch + Install Desktop + VNC
        run: |
          # BlackArch is Arch-based — xrdp and x11vnc are AUR-only.
          # Use tigervnc (official Arch/BlackArch repos) + noVNC browser access.
          docker pull blackarchlinux/blackarch
          docker run -d --name blackarch -p 5901:5901 blackarchlinux/blackarch sleep infinity

          # Install tigervnc + XFCE4 (all available in BlackArch/Arch repos)
          docker exec blackarch bash -c "pacman -Sy --noconfirm \
            tigervnc xfce4 xfce4-goodies \
            curl wget git nmap python3 net-tools htop neofetch \
            metasploit sqlmap nikto exploitdb 2>/dev/null || true"

          # Create user
          docker exec blackarch bash -c "useradd -m -s /bin/bash xploit && echo 'xploit:phantom' | chpasswd 2>/dev/null || true"

          # Set up VNC password
          docker exec blackarch bash -c "mkdir -p /root/.vnc && printf 'phantom\nphantom\n\n' | vncpasswd 2>/dev/null; chmod 600 /root/.vnc/passwd 2>/dev/null || true"

          # xstartup — run XFCE4 when Xvnc session starts
          docker exec blackarch bash -c 'cat > /root/.vnc/xstartup << "EOF"
#!/bin/sh
export XDG_CONFIG_DIRS=/etc/xdg
export XDG_DATA_DIRS=/usr/share:/usr/local/share
exec startxfce4
EOF
chmod +x /root/.vnc/xstartup'

      - name: Start VNC Server (tigervnc Xvnc)
        run: |
          # vncserver starts Xvnc (virtual display) + runs xstartup = XFCE4
          docker exec -d blackarch bash -c "vncserver :1 -geometry 1280x800 -depth 24 -localhost no 2>/dev/null"
          sleep 6

          echo "--- Checking VNC port ---"
          docker exec blackarch bash -c "ss -tlnp 2>/dev/null | grep 5901 || echo 'port check done'"

      - name: Setup noVNC on Host + Bore Tunnel + Send DM
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          pip3 install websockify --quiet 2>/dev/null || true
          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null 2>&1

          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 8080 > /tmp/novnc.log 2>&1 &
          sleep 4

          curl -sL -o bore.tar.gz \
            https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 8080 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **BlackArch Launch Failed** — bore tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          BROWSER_LINK="http://bore.pub:$PORT/vnc.html?autoconnect=1&password=phantom&compression=2&quality=6"

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"☠️ **BLACKARCH LINUX — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🌐 **Browser Access (no app needed):**\n$BROWSER_LINK\n\n🔑 **VNC Password:** \`phantom\`\n⏱ **Duration:** $DURATION minutes\n\n*Click the link — opens directly in your browser.*\n**BlackArch Linux — 2800+ hacking tools available via pacman.**\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
