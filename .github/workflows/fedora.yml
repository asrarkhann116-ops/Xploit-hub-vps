name: Xploit-HUB-Fedora
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Pull Fedora + Install xRDP Desktop
        run: |
          docker pull fedora:40
          docker run -d --name fedora -p 3389:3389 fedora:40 sleep infinity

          docker exec fedora bash -c "dnf install -y \
            xrdp @xfce-desktop-environment dbus-x11 \
            curl jq zip nmap git python3 net-tools htop 2>/dev/null || true"

          docker exec fedora bash -c "useradd -m -s /bin/bash xploit && echo 'xploit:phantom' | chpasswd && usermod -aG wheel xploit"
          docker exec fedora bash -c "echo 'startxfce4' > /home/xploit/.xsession && chmod +x /home/xploit/.xsession && chown xploit:xploit /home/xploit/.xsession"
          docker exec fedora bash -c "sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true"
          docker exec -d fedora bash -c "/usr/sbin/xrdp-sesman && sleep 1 && /usr/sbin/xrdp"
          sleep 5

      - name: Bore Tunnel + Send DM
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          curl -sL -o bore.tar.gz \
            https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 3389 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **Fedora Launch Failed** — bore tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🎩 **REAL FEDORA 40 xRDP — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🖥️ **Open Remote Desktop Connection:**\n**Computer:** \`bore.pub:$PORT\`\n**Username:** \`xploit\`\n**Password:** \`phantom\`\n\n*Accept any certificate warnings.*\n⏱ **Duration:** $DURATION minutes\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
