name: Xploit-HUB-macOS
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: ''

jobs:
  launch:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Enable Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw phantom \
            -restart -agent -privs -all 2>/dev/null || true
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist \
            com.apple.screensharing -dict Disabled -bool false 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sleep 5

      - name: Setup noVNC (Browser Access) & Notify Discord
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          # Install websockify to bridge VNC → WebSocket for browser access
          pip3 install websockify --quiet 2>/dev/null || pip install websockify --quiet 2>/dev/null || true

          # Clone noVNC (browser-based VNC client — no app download needed)
          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null 2>&1

          # Start websockify: wraps VNC port 5900 as WebSocket on port 6080
          nohup python3 -m websockify --web noVNC/ 6080 localhost:5900 > ws.log 2>&1 &
          sleep 3

          # Cloudflare tunnel to expose noVNC web UI
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            CF_BIN="cloudflared-darwin-arm64"
          else
            CF_BIN="cloudflared-darwin-amd64"
          fi
          curl -sL -o cf "https://github.com/cloudflare/cloudflared/releases/latest/download/$CF_BIN"
          chmod +x cf

          nohup ./cf tunnel --url http://localhost:6080 > cf.log 2>&1 &

          CF_URL=""
          for i in $(seq 1 25); do
            CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log 2>/dev/null | head -n 1)
            [ -n "$CF_URL" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$CF_URL" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **macOS Launch Failed** — tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          # Build browser link — no VNC app needed!
          BROWSER_LINK="$CF_URL/vnc.html?autoconnect=1&password=phantom&compression=2&quality=6"

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🍎 **macOS SONOMA — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🌐 **Browser Access (no app needed):**\n$BROWSER_LINK\n\n🔑 **VNC Password:** \`phantom\`\n⏱ **Duration:** $DURATION minutes\n\n*Just click the link — opens directly in your browser!*\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
