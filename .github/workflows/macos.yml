name: Xploit-HUB-macOS
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: ''

jobs:
  launch:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Enable Screen Sharing (VNC on port 5900)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw phantom \
            -restart -agent -privs -all 2>/dev/null || true
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist \
            com.apple.screensharing -dict Disabled -bool false 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

          # Wait for VNC to actually start accepting connections
          echo "Waiting for VNC port 5900..."
          for i in $(seq 1 30); do
            nc -z localhost 5900 2>/dev/null && echo "VNC is up!" && break
            sleep 3
          done

      - name: Setup noVNC + Bore Tunnel & Notify Discord
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          pip3 install websockify --quiet 2>/dev/null || pip install websockify --quiet 2>/dev/null || true

          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null 2>&1

          # novnc_proxy handles both HTTP file serving AND WebSocket proxy to VNC
          # This is the same reliable approach used by the Linux workflows
          ./noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 8080 > /tmp/novnc.log 2>&1 &
          sleep 5

          # Verify novnc_proxy is running
          if ! pgrep -f "novnc_proxy\|websockify" > /dev/null; then
            echo "novnc_proxy failed, falling back to direct websockify..."
            python3 -m websockify --web noVNC/ --timeout 0 8080 localhost:5900 > /tmp/ws.log 2>&1 &
            sleep 3
          fi

          # Download bore (ARM64 for Apple Silicon, fallback to x86_64 for Intel)
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            curl -sL -o bore.tar.gz \
              https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin.tar.gz
          else
            curl -sL -o bore.tar.gz \
              https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-apple-darwin.tar.gz
          fi
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 8080 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **macOS Launch Failed** — tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          BROWSER_LINK="http://bore.pub:$PORT/vnc.html?autoconnect=1&password=phantom&compression=2&quality=6"

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🍎 **macOS SONOMA — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🌐 **Browser Access (no app needed):**\n$BROWSER_LINK\n\n🔑 **VNC Password:** \`phantom\`\n⏱ **Duration:** $DURATION minutes\n\n*Just click the link — opens in your browser directly!*\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
