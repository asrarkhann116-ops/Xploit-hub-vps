name: Xploit-HUB-Parrot
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: true
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Pull Real Parrot OS & Install Desktop
        run: |
          docker pull parrotsec/security:latest
          docker run -d --name parrot -p 5901:5901 parrotsec/security:latest sleep infinity
          docker exec parrot bash -c "apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies x11vnc xvfb curl jq zip nmap sqlmap nikto gobuster john hashcat net-tools dnsutils whois 2>/dev/null || true"

      - name: Start Parrot Desktop & Tunnel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
          WALLPAPER: ${{ github.event.inputs.wallpaper_url }}
        run: |
          docker exec -d parrot bash -c "Xvfb :1 -screen 0 1280x720x16 > /tmp/xvfb.log 2>&1"
          sleep 3
          docker exec -d parrot bash -c "DISPLAY=:1 startxfce4 > /tmp/xfce.log 2>&1"
          sleep 5
          docker exec -d parrot bash -c "x11vnc -display :1 -passwd phantom -forever -rfbport 5901 -noxdamage -o /tmp/vnc.log"
          sleep 2

          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null 2>&1
          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 8080 &

          curl -sL -o cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cf
          nohup ./cf tunnel --url http://localhost:8080 > cf.log 2>&1 &

          CF_URL=""
          for i in $(seq 1 20); do
            CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log 2>/dev/null | head -n 1)
            [ -n "$CF_URL" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$CF_URL" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **Parrot Launch Failed** — tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🦜 **REAL PARROT OS — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n🔗 **Access:** $CF_URL/vnc.html?autoconnect=1&compression=2&quality=6\n🔑 **Password:** \`phantom\`\n⏱ **Duration:** $DURATION minutes\n\n**Real Parrot Security OS with hacking tools.**\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
