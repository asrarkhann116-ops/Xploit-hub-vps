name: Xploit-HUB-Parrot
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Pull Parrot OS + Install xRDP Desktop
        run: |
          docker pull parrotsec/core:rolling
          docker run -d --name parrot -p 3389:3389 parrotsec/core:rolling sleep infinity

          # Parrot is Debian-based — same apt approach as Kali/Debian
          docker exec parrot bash -c "apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xfce4 xfce4-terminal dbus-x11 tigervnc-standalone-server \
            curl jq zip nmap git python3 net-tools sudo \
            sqlmap nikto dirb hydra john hashcat 2>/dev/null || true"

          # Create user
          docker exec parrot bash -c "useradd -m -s /bin/bash xploit && echo 'xploit:phantom' | chpasswd && usermod -aG sudo xploit 2>/dev/null || true"

          # KEY FIX: dbus-launch required for xfce4-session
          docker exec parrot bash -c "printf '#!/bin/sh\nexec dbus-launch --exit-with-session startxfce4\n' > /etc/xrdp/startwm.sh && chmod +x /etc/xrdp/startwm.sh"
          docker exec parrot bash -c "sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true"

          # Create runtime dirs
          docker exec parrot bash -c "mkdir -p /var/run/xrdp /run/xrdp && chmod 755 /var/run/xrdp /run/xrdp"

          # Start xrdp-sesman first, then xrdp
          docker exec -d parrot bash -c "xrdp-sesman --nodaemon > /tmp/sesman.log 2>&1"
          sleep 4
          docker exec -d parrot bash -c "xrdp --nodaemon > /tmp/xrdp.log 2>&1"
          sleep 3

      - name: Bore Tunnel + Send DM
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          curl -sL -o bore.tar.gz \
            https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 3389 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **Parrot OS Launch Failed** — bore tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🦜 **PARROT OS xRDP — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🖥️ **Open Remote Desktop Connection:**\n**Computer:** \`bore.pub:$PORT\`\n**Username:** \`xploit\`\n**Password:** \`phantom\`\n\n*Accept any certificate warnings.*\n⏱ **Duration:** $DURATION minutes\n\n**Parrot Security OS — Nmap, SQLMap, Nikto, Hydra, John, Hashcat included.**\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
