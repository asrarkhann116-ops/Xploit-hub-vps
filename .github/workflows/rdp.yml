name: Xploit-HUB-RDP
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: true
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Enable RDP & Create User
        shell: powershell
        run: |
          $OutputEncoding = [Console]::InputEncoding = [Console]::OutputEncoding = New-Object System.Text.UTF8Encoding

          secedit /export /cfg C:\secpol.cfg /quiet
          (Get-Content C:\secpol.cfg) -replace "PasswordComplexity = 1","PasswordComplexity = 0" | Set-Content C:\secpol.cfg
          secedit /configure /db C:\Windows\security\local.sdb /cfg C:\secpol.cfg /quiet
          Write-Host "Password complexity disabled"

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

          $pw = ConvertTo-SecureString "phantom" -AsPlainText -Force
          $result = New-LocalUser "xploit" -Password $pw -PasswordNeverExpires -UserMayNotChangePassword -ErrorAction SilentlyContinue
          if (-not $result) {
            Set-LocalUser -Name "xploit" -Password $pw -ErrorAction SilentlyContinue
          }
          Add-LocalGroupMember -Group "Administrators" -Member "xploit" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "xploit" -ErrorAction SilentlyContinue

          $u = Get-LocalUser -Name "xploit" -ErrorAction SilentlyContinue
          if ($u) { Write-Host "SUCCESS: user xploit ready" } else { Write-Host "ERROR: user xploit not found"; exit 1 }

      - name: Bore Tunnel & Send DM
        shell: powershell
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          $OutputEncoding = [Console]::InputEncoding = [Console]::OutputEncoding = New-Object System.Text.UTF8Encoding
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive -LiteralPath bore.zip -DestinationPath . -Force

          Start-Process -FilePath ".\bore.exe" -ArgumentList "local","3389","--to","bore.pub" `
            -RedirectStandardOutput "bore.log" -RedirectStandardError "bore.err" -NoNewWindow

          $PORT = ""
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep 3
            $log = @()
            if (Test-Path bore.log) { $log += Get-Content bore.log -Encoding UTF8 -ErrorAction SilentlyContinue }
            if (Test-Path bore.err) { $log += Get-Content bore.err -Encoding UTF8 -ErrorAction SilentlyContinue }
            foreach ($line in $log) {
              if ($line -match "bore\.pub:(\d+)") { $PORT = $Matches[1]; break }
              if ($line -match "remote_port=(\d+)")  { $PORT = $Matches[1]; break }
            }
            if ($PORT) { break }
          }

          if (-not $PORT) {
            Write-Host "ERROR: Bore tunnel failed to connect."
            exit 1
          }

          Write-Host "=========================================="
          Write-Host "  WINDOWS 10 RDP - SESSION ACTIVE"
          Write-Host "=========================================="
          Write-Host "  Computer : bore.pub:$PORT"
          Write-Host "  Username : xploit"
          Write-Host "  Password : phantom"
          Write-Host "  Duration : $env:DURATION minutes"
          Write-Host "=========================================="

          # Helper: send Discord API request with proper UTF-8 encoding
          function Invoke-Discord {
            param($Uri, $Body)
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($Body)
            Invoke-RestMethod -Uri $Uri -Method POST `
              -Headers @{ "Authorization" = "Bot $env:DISCORD_TOKEN" } `
              -Body $bytes -ContentType "application/json; charset=utf-8"
          }

          $nl = "`n"
          $msg = "[Windows 10 RDP] SESSION ACTIVE" + $nl
          $msg += "Operator: <@" + $env:USER_ID + ">" + $nl + $nl
          $msg += "Open Remote Desktop Connection:" + $nl
          $msg += "Computer : bore.pub:" + $PORT + $nl
          $msg += "Username : xploit" + $nl
          $msg += "Password : phantom" + $nl
          $msg += "Duration : " + $env:DURATION + " minutes" + $nl
          $msg += "Accept any certificate warnings."

          $msgJson = [pscustomobject]@{ content = $msg } | ConvertTo-Json -Compress

          # Try DM
          $dmSent = $false
          try {
            $chanJson = [pscustomobject]@{ recipient_id = $env:USER_ID } | ConvertTo-Json -Compress
            $r = Invoke-Discord -Uri "https://discord.com/api/v10/users/@me/channels" -Body $chanJson
            $CID = $r.id
            if ($CID) {
              Invoke-Discord -Uri "https://discord.com/api/v10/channels/$CID/messages" -Body $msgJson
              Write-Host "Discord DM sent OK."
              $dmSent = $true
            }
          } catch {
            Write-Host "DM failed: $_"
          }

          # Fallback: VPS channel
          if (-not $dmSent) {
            try {
              Invoke-Discord -Uri "https://discord.com/api/v10/channels/1497364285645652098/messages" -Body $msgJson
              Write-Host "Posted in VPS channel."
            } catch {
              Write-Host "Channel post failed: $_"
              Write-Host "RDP still active - connect with details above."
            }
          }

          Start-Sleep ([int]$env:DURATION * 60)
