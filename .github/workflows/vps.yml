name: Xploit-HUB-VPS
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: 'https://images.wallpapersden.com/image/download/red-hacker-binary-code_bWZtZ2aUmZqaraWkpJRmbmdlrWZnZWU.jpg'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Install xRDP + Desktop + Arsenal
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xfce4 xfce4-goodies dbus-x11 \
            curl jq figlet zip wget unzip git vim nano tmux \
            nmap sqlmap dirb net-tools ncat python3 python3-pip 2>/dev/null || true

          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.2.3/nuclei_3.2.3_linux_amd64.zip \
            -O nuclei.zip 2>/dev/null || true
          unzip -q nuclei.zip 2>/dev/null && sudo mv nuclei /usr/local/bin/ 2>/dev/null || true
          rm -f nuclei.zip

      - name: Configure xRDP + Create User
        run: |
          sudo useradd -m -s /bin/bash xploit
          echo "xploit:phantom" | sudo chpasswd
          sudo usermod -aG sudo xploit

          echo "startxfce4" | sudo tee /home/xploit/.xsession
          sudo chmod +x /home/xploit/.xsession
          sudo chown xploit:xploit /home/xploit/.xsession

          # xrdp must use xfce4 via .xsession
          sudo bash -c 'echo "test -x /etc/X11/Xsession && exec /etc/X11/Xsession" >> /etc/xrdp/startwm.sh' 2>/dev/null || true
          echo "startxfce4" | sudo tee /root/.xsession

          # Reduce color depth to 24bpp for stability
          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true
          sudo sed -i 's/^port=3389/port=3389/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          sudo systemctl enable xrdp 2>/dev/null || true
          sudo systemctl start xrdp
          sleep 3
          sudo systemctl status xrdp --no-pager || true

      - name: Bore Tunnel + Send DM
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          curl -sL -o bore.tar.gz \
            https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          nohup ./bore local 3389 --to bore.pub > bore.log 2>&1 &

          PORT=""
          for i in $(seq 1 30); do
            PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log 2>/dev/null | cut -d':' -f2 | head -n 1)
            [ -z "$PORT" ] && PORT=$(grep -o 'remote_port=[0-9]*' bore.log 2>/dev/null | cut -d'=' -f2 | head -n 1)
            [ -n "$PORT" ] && break
            sleep 3
          done

          CID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"recipient_id\": \"$USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ -z "$PORT" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
              -X POST -d "{\"content\": \"❌ **Ubuntu VPS Launch Failed** — bore tunnel could not start. Please try again.\"}" \
              "https://discord.com/api/v10/channels/$CID/messages"
            exit 1
          fi

          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" \
            -X POST -d "{\"content\": \"🐧 **UBUNTU 22.04 xRDP — SESSION ACTIVE**\n👤 **Operator:** <@$USER_ID>\n\n🖥️ **Open Remote Desktop Connection:**\n**Computer:** \`bore.pub:$PORT\`\n**Username:** \`xploit\`\n**Password:** \`phantom\`\n\n*Accept any certificate warnings.*\n⏱ **Duration:** $DURATION minutes\n\n**Tools loaded:** Nmap, SQLMap, Nuclei, Dirb\"}" \
            "https://discord.com/api/v10/channels/$CID/messages"

          while true; do sleep 3600; done
