name: Xploit-HUB-VPS
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: System Prep
        run: |
          sudo apt-get update > /dev/null
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver websockify xprintidle curl jq > /dev/null
          
      - name: UI & Tunnel Setup
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
        run: |
          # 1. Start VNC
          mkdir -p ~/.vnc && echo "phantom" | vncpasswd -f > ~/.vnc/passwd && chmod 600 ~/.vnc/passwd
          vncserver :1 -geometry 1280x720 -depth 16
          
          # 2. Start NoVNC
          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null
          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 8080 &
          
          # 3. Start Cloudflare Tunnel
          curl -L -o cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x cf
          nohup ./cf tunnel --url http://localhost:8080 > cf.log 2>&1 &
          
          sleep 20
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          
          # 4. Notify Discord DM
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"🛰️ **Xploit HUB Emergency VPS Active!**\n\n👤 **Operator:** <@$USER_ID>\n🔗 **Link:** $CF_URL/vnc.html\n🔑 **Pass:** \`phantom\`\n\n⏱️ **Rule:** 15 Minutes AFK = Auto-Kill!\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages

          # 5. 🔥 THE REFINED AFK KILLER (Stable Version)
          echo "AFK Monitor Started. 15min limit."
          export DISPLAY=:1
          while true; do
            # Safely get idle time, fallback to 0 if command fails
            IDLE_TIME=$(xprintidle 2>/dev/null || echo 0)
            
            # Check if it's a valid number before comparing
            if [[ "$IDLE_TIME" =~ ^[0-9]+$ ]] && [ "$IDLE_TIME" -gt 900000 ]; then
              echo "AFK Detected ($IDLE_TIME ms)! Burning session..."
              exit 0
            fi
            
            sleep 60
          done
