name: Xploit-HUB-VPS
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration'
        required: true
        default: '60'

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: System Prep
        run: |
          sudo apt-get update > /dev/null
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver websockify curl jq figlet zenity > /dev/null
          
      - name: Elite Branding & UI Setup
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          # 1. Start VNC
          mkdir -p ~/.vnc && echo "phantom" | vncpasswd -f > ~/.vnc/passwd && chmod 600 ~/.vnc/passwd
          vncserver :1 -geometry 1280x720 -depth 16
          
          # 2. New Pinterest Wallpaper
          curl -L -o /tmp/wall.jpg "https://i.pinimg.com/736x/42/3a/2f/423a2f1a8f888cb9068dc68daed56967.jpg"
          DISPLAY=:1 xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -n -t string -s "/tmp/wall.jpg"
          
          # 3. Custom Terminal & Branding
          echo 'figlet -f slant "Xploit HUB"' >> ~/.bashrc
          echo 'echo -e "\e[1;31mOWN THE MACHINE. EXPLOIT THE WEAK.\e[0m"' >> ~/.bashrc
          echo 'export PS1="\[\e[1;31m\]XploitHUB@Terminal:\[\e[0m\]\w\$ "' >> ~/.bashrc
          
          # 4. Create "MEGA SAVE" Script
          cat << 'EOF' > ~/Desktop/MEGA_SAVE.sh
          #!/bin/bash
          zenity --info --text="🚀 Xploit HUB: Backing up your data... Please wait." --title="System Backup"
          zip -r /tmp/backup.zip /home/runner/Desktop /home/runner/Documents > /dev/null
          LINK=$(curl -s --upload-file /tmp/backup.zip https://bashupload.com/backup.zip)
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id' > /tmp/cid
          CHANNEL_ID=$(cat /tmp/cid)
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"✅ **Backup Complete!**\n📦 **Download:** $LINK\n⚠️ *Link expires in 24 hours.*\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages
          zenity --info --text="✅ Backup sent to your Discord DM!" --title="Success"
          EOF
          chmod +x ~/Desktop/MEGA_SAVE.sh

          # 5. Boot Welcome Popup
          echo "DISPLAY=:1 zenity --info --text='🛰️ Welcome to Xploit HUB Pro VPS\nAuthorized Access: $USER_NAME\nDuration: $DURATION Minutes' --title='Xploit HUB Security' &" >> ~/.bashrc

          # 6. Start NoVNC
          git clone https://github.com/novnc/noVNC.git --depth 1 > /dev/null
          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 8080 &
          
          # 7. Start Cloudflare Tunnel
          curl -L -o cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x cf
          nohup ./cf tunnel --url http://localhost:8080 > cf.log 2>&1 &
          
          sleep 20
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          
          # 8. Notify Discord DM
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"🛰️ **Xploit HUB Pro - SESSION ACTIVE**\n\n👤 **Operator:** <@$USER_ID>\n🔗 **Access:** $CF_URL/vnc.html\n🔑 **Password:** \`phantom\`\n\n⏱️ **Auto-Destruct:** $DURATION Minutes.\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages

          while true; do sleep 3600; done
