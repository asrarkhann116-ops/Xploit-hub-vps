name: Xploit-HUB-Tiny10
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Discord User ID'
        required: true
      user_name:
        description: 'Discord User Name'
        required: true
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'
      wallpaper_url:
        description: 'Wallpaper URL'
        required: false
        default: ''

jobs:
  launch:
    runs-on: windows-2022
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration) }}
    steps:
      - name: Debloat + Enable RDP & Create User
        shell: powershell
        run: |
          $OutputEncoding = [Console]::InputEncoding = [Console]::OutputEncoding = New-Object System.Text.UTF8Encoding

          # --- DEBLOAT: remove bloatware for lighter/faster session ---
          $bloat = @(
            'Microsoft.Xbox.TCUI','Microsoft.XboxApp','Microsoft.XboxGameOverlay',
            'Microsoft.XboxGamingOverlay','Microsoft.XboxIdentityProvider',
            'Microsoft.XboxSpeechToTextOverlay','Microsoft.ZuneMusic',
            'Microsoft.ZuneVideo','Microsoft.WindowsMaps','Microsoft.SkypeApp',
            'Microsoft.BingWeather','Microsoft.BingNews','Microsoft.GetHelp',
            'Microsoft.Getstarted','Microsoft.MicrosoftSolitaireCollection',
            'Microsoft.MixedReality.Portal','Microsoft.People',
            'Microsoft.WindowsFeedbackHub','Microsoft.YourPhone',
            'Microsoft.Microsoft3DViewer','Microsoft.Print3D'
          )
          foreach ($app in $bloat) {
            Get-AppxPackage -Name $app -ErrorAction SilentlyContinue | Remove-AppxPackage -ErrorAction SilentlyContinue
          }

          # --- Disable heavy background services ---
          $services = @(
            'WSearch','SysMain','DiagTrack','dmwappushservice','wuauserv',
            'XblAuthManager','XblGameSave','XboxNetApiSvc','XboxGipSvc',
            'RetailDemo','WMPNetworkSvc','Fax','MapsBroker'
          )
          foreach ($s in $services) {
            try { Stop-Service -Name $s -Force -ErrorAction SilentlyContinue } catch {}
            try { Set-Service  -Name $s -StartupType Disabled -ErrorAction SilentlyContinue } catch {}
          }

          # --- Disable telemetry ---
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection' `
            -Name 'AllowTelemetry' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue

          Write-Host 'Debloat complete - system is lighter now'

          # --- Security policy ---
          secedit /export /cfg C:\secpol.cfg /quiet
          (Get-Content 'C:\secpol.cfg') -replace 'PasswordComplexity = 1','PasswordComplexity = 0' |
            Set-Content 'C:\secpol.cfg'
          secedit /configure /db C:\Windows\security\local.sdb /cfg C:\secpol.cfg /quiet

          # --- Enable RDP ---
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name 'UserAuthentication' -Value 0

          # --- Create user ---
          $pw = ConvertTo-SecureString 'phantom' -AsPlainText -Force
          $u = Get-LocalUser -Name 'xploit' -ErrorAction SilentlyContinue
          if ($u) {
            Set-LocalUser -Name 'xploit' -Password $pw -ErrorAction SilentlyContinue
          } else {
            New-LocalUser 'xploit' -Password $pw -PasswordNeverExpires -UserMayNotChangePassword -ErrorAction SilentlyContinue
          }
          Add-LocalGroupMember -Group 'Administrators'       -Member 'xploit' -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group 'Remote Desktop Users' -Member 'xploit' -ErrorAction SilentlyContinue

          $check = Get-LocalUser -Name 'xploit' -ErrorAction SilentlyContinue
          if ($check) { Write-Host 'SUCCESS: user xploit ready' } else { Write-Host 'ERROR: user not found'; exit 1 }

      - name: Pinggy Tunnel & Send DM
        shell: powershell
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: ${{ github.event.inputs.user_id }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          $OutputEncoding = [Console]::InputEncoding = [Console]::OutputEncoding = New-Object System.Text.UTF8Encoding
          $TOKEN = $env:DISCORD_TOKEN
          $UID   = $env:USER_ID
          $DUR   = $env:DURATION
          $nl    = "`n"
          $AUTH  = "Authorization: Bot $TOKEN"

          # Pinggy free TCP tunnel
          # username = free+tcp@a.pinggy.io  (+ separates token from keyword)
          # 127.0.0.1 instead of localhost   (Windows SSH localhost resolution bug)
          # address comes out of STDERR as:  tcp://xxxxx.a.pinggy.link:PORT
          $PinggyJob = Start-Process -FilePath 'ssh' `
            -ArgumentList '-p','443','-N','-o','StrictHostKeyChecking=no',`
                          '-o','ServerAliveInterval=30','-o','ExitOnForwardFailure=yes',`
                          '-R','0:127.0.0.1:3389','free+tcp@a.pinggy.io' `
            -RedirectStandardOutput 'pinggy.log' -RedirectStandardError 'pinggy.err' -NoNewWindow -PassThru

          $ADDR = ''
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep 3
            $log = ''
            if (Test-Path pinggy.log) { $log += (Get-Content pinggy.log -Raw -ErrorAction SilentlyContinue) }
            if (Test-Path pinggy.err) { $log += (Get-Content pinggy.err -Raw -ErrorAction SilentlyContinue) }
            if ($i -eq 5) { Write-Host "=== DEBUG (attempt $i) ==="; Write-Host $log }
            if ($log -match 'tcp://([a-z0-9]+\.a\.pinggy\.link:\d+)') { $ADDR = $Matches[1]; break }
            if ($log -match 'tcp://([^\s\r\n/]+)')                    { $ADDR = $Matches[1]; break }
          }

          if (-not $ADDR) {
            Write-Host '=== PINGGY.LOG ==='; if (Test-Path pinggy.log) { Get-Content pinggy.log }
            Write-Host '=== PINGGY.ERR ==='; if (Test-Path pinggy.err) { Get-Content pinggy.err }
            Write-Host 'ERROR: Pinggy tunnel failed.'; exit 1
          }

          Write-Host "Pinggy address: $ADDR"

          $MSG  = "🪶 **[Tiny10 RDP] SESSION ACTIVE**" + $nl
          $MSG += "👤 **Operator:** <@$UID>" + $nl + $nl
          $MSG += "🖥️ **Open Remote Desktop Connection:**" + $nl
          $MSG += "**Computer:** ``$ADDR``" + $nl
          $MSG += "**Username:** ``xploit``" + $nl
          $MSG += "**Password:** ``phantom``" + $nl + $nl
          $MSG += "*Accept any certificate warnings.*" + $nl
          $MSG += "⏱ **Duration:** 1 Hour" + $nl + $nl
          $MSG += "Debloated -- Xbox, bloatware, telemetry all removed for faster performance." + $nl
          $MSG += "⚠️ Pinggy free = max 1 hour tunnel. After 1hr, run /vps again for a fresh session."

          $chanFile  = "$env:TEMP\chan.json"
          $msgFile   = "$env:TEMP\msg.json"
          $utf8NoBOM = [System.Text.UTF8Encoding]::new($false)
          $chanJson  = [pscustomobject]@{ recipient_id = $UID } | ConvertTo-Json -Compress
          $msgJson   = [pscustomobject]@{ content = $MSG } | ConvertTo-Json -Compress
          [System.IO.File]::WriteAllText($chanFile, $chanJson, $utf8NoBOM)
          [System.IO.File]::WriteAllText($msgFile,  $msgJson,  $utf8NoBOM)

          $AUTH   = "Authorization: Bot $TOKEN"
          $dmSent = $false

          $chanResp = curl.exe -s -X POST 'https://discord.com/api/v10/users/@me/channels' `
            -H $AUTH -H 'Content-Type: application/json' --data "@$chanFile"
          Write-Host "Chan resp: $chanResp"
          $CID = ($chanResp | ConvertFrom-Json -ErrorAction SilentlyContinue).id

          if ($CID) {
            $sendResp = curl.exe -s -X POST "https://discord.com/api/v10/channels/$CID/messages" `
              -H $AUTH -H 'Content-Type: application/json' --data "@$msgFile"
            Write-Host "DM resp: $sendResp"
            if ($sendResp -notmatch '"code"') { $dmSent = $true; Write-Host 'DM sent OK.' }
          }

          if (-not $dmSent) {
            Write-Host 'Trying VPS channel fallback...'
            $chanPost = curl.exe -s -X POST 'https://discord.com/api/v10/channels/1497364285645652098/messages' `
              -H $AUTH -H 'Content-Type: application/json' --data "@$msgFile"
            Write-Host "Channel resp: $chanPost"
          }

          Start-Sleep ([int]$env:DURATION * 60)
